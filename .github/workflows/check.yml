name: check

# Build gate вЂ” runs `npm run check` (tsc --noEmit && next build) on every
# push to main and on every pull request. Two prod build failures during
# the 2026-04-26 review session would have been caught by this.
#
# This is the gate referenced in CLAUDE.md "Conventions". A failing run
# here doesn't directly block the Netlify deploy (Netlify watches the
# branch independently), but it surfaces the failure in the GitHub PR /
# commit UI before Netlify burns a build slot, and gives a single place
# to add the cross-tenant isolation smoke test (B2 in 30-day-plan.md)
# once it lands.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: tsc + next build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # The build needs the same NEXT_PUBLIC_* env vars Netlify uses, otherwise
    # Next collects-page-data step fails with "Invalid public environment
    # variables". Provide placeholders here вЂ” they're fine for compilation,
    # the real values live in Netlify env. Add real values to GitHub Actions
    # secrets only if a future check needs to actually call Supabase.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build-only
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-for-build-only
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure git for private @eq-solutions deps
        run: |
          git config --global --add url."https://${{ secrets.EQ_TOKENS_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://${{ secrets.EQ_TOKENS_PAT }}@github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://${{ secrets.EQ_TOKENS_PAT }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://${{ secrets.EQ_TOKENS_PAT }}@github.com/".insteadOf "git+ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Next.js build
        run: npx next build

      - name: Vitest
        run: npx vitest run

      # Mojibake guard вЂ” catches UTF-8-read-as-Latin-1 corruption signatures
      # in source files. The class hit /admin/archive on 2026-05-15 (the
      # "Г‚В· Change ГўвЂ '" rendering bug fixed in PR #139). Cheaper to grep
      # at PR time than to catch in browser later.
      #
      # Patterns:
      #   Г‚В·  Г‚   ГўвЂ   ГўвЂ”  Гўв‚¬  Гўв‚¬в„ў  Гўв‚¬"  Гўв‚¬Е“  ГўвЂќ
      # These are the UTF-8 representations of common characters (В·, в†’,
      # в—Џ, вЂ”, ', ", ", в”Ђ) when their bytes were read as Latin-1 then
      # re-encoded as UTF-8.
      #
      # Scope: source files only (app/, lib/, components/, docs/, scripts/).
      # Excluded:
      #   - node_modules (third-party junk)
      #   - .next / .next-old (build output)
      #   - lib/supabase/database.types.ts (autogenerated; never inspect)
      #   - supabase/migrations/ (some legitimate prod-recovered content
      #     contains the patterns inside string literals on purpose)
      - name: Mojibake guard
        run: |
          set -euo pipefail
          MOJIBAKE_PATTERN='Г‚В·|Г‚ |ГўвЂ |ГўвЂ”|Гўв‚¬|ГўвЂќ'
          MATCHES=$(grep -rEn --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' --include='*.md' --include='*.css' --include='*.html' \
            --exclude='database.types.ts' \
            -- "$MOJIBAKE_PATTERN" \
            app/ lib/ components/ docs/ scripts/ 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Mojibake detected вЂ” UTF-8-read-as-Latin-1 corruption in source files."
            echo "Found:"
            echo "$MATCHES"
            echo ""
            echo "Fix: replace the corrupted bytes with the correct UTF-8 character."
            echo "Common mappings:"
            echo "  Г‚В·          в†’ В·   (middle dot)"
            echo "  ГўвЂ '  / ГўвЂ    в†’ в†’   (right arrow)"
            echo "  Гўв‚¬\"         в†’ вЂ”   (em dash)"
            echo "  Гўв‚¬в„ў         в†’ '   (right single quote)"
            echo "  Гўв‚¬Е“ / Гўв‚¬    в†’ \" \"  (curly double quotes)"
            echo "  ГўвЂќ          в†’ в”Ђ   (box drawing)"
            exit 1
          fi
          echo "Mojibake guard: clean."
