name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck-and-audit:
    name: Typecheck + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@eq-solutions'

      - name: Configure git for private @eq-solutions deps
        run: |
          git config --global --add url."https://${{ secrets.EQ_TOKENS_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://${{ secrets.EQ_TOKENS_PAT }}@github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://${{ secrets.EQ_TOKENS_PAT }}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://${{ secrets.EQ_TOKENS_PAT }}@github.com/".insteadOf "git+ssh://git@github.com/"

      - name: Install deps
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.EQ_TOKENS_PAT }}

      - name: TypeScript (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Server-action security audit
        # Fails if any mutating server action lacks a requireUser()/getApiUser()
        # /auth.getUser() guard. Reviewed exceptions live in the script's
        # ALLOWLIST. Pure static check — no DB needed.
        run: npm run audit:actions

      - name: npm audit (high severity)
        # Fails if any high or critical vulnerabilities are present.
        # Use `npm audit fix` locally before opening the PR.
        run: npm audit --audit-level=high
