[build]
  # Lockfile resolved URLs use HTTPS codeload tarball format so npm ci
  # doesn't need SSH access to GitHub. GITHUB_TOKEN env var is kept for
  # any future private deps — when unset the rewrite targets plain HTTPS.
  command = """
    GHBASE="https://${GITHUB_TOKEN:+${GITHUB_TOKEN}@}github.com/" && \
    git config --global --add url."${GHBASE}".insteadOf "https://github.com/" && \
    git config --global --add url."${GHBASE}".insteadOf "git@github.com:" && \
    git config --global --add url."${GHBASE}".insteadOf "ssh://git@github.com/" && \
    git config --global --add url."${GHBASE}".insteadOf "git+ssh://git@github.com/" && \
    npm ci && \
    npm run build
    """
  publish = ".next"

# ─────────── Scheduled Functions ───────────
#
# Supervisor digest — fires daily at 21:00 UTC. That's 07:00 AEST (winter)
# and 08:00 AEDT (summer). The small DST drift is acceptable for a
# day-ahead digest; supervisors don't need minute-level precision.
#
# Schedule: minute hour day-of-month month day-of-week
#   "0 21 * * *" = every day at 21:00 UTC
#
# The function POSTs to /api/cron/supervisor-digest with the CRON_SECRET
# bearer token so the route authenticates it.
[functions."supervisor-digest-scheduler"]
  schedule = "0 21 * * *"

# Pre-visit tech brief — fires daily at 07:00 UTC (~17:00 AEST / 18:00 AEDT),
# the evening before. Sends a brief for each scheduled check happening tomorrow
# in the tenant's tz. DST drift is acceptable (day-ahead notice).
#
# SAFETY: the route (/api/cron/pre-visit-brief) is dry-run unless
# PRE_VISIT_BRIEF_CRON_ENABLED=true — this schedule firing emails nobody until
# that env var is set in Netlify.
[functions."pre-visit-brief-scheduler"]
  schedule = "0 7 * * *"

# ─────────── Canonical Outbox Drainer ───────────
#
# Replays canonical-api writes that failed their inline attempt — durability for
# the canonical reference-layer sync (see lib/canonical-outbox.ts and
# lib/canonical-sync.ts). Fires every 5 minutes and POSTs to
# /api/cron/canonical-outbox-drain with the CRON_SECRET bearer token. A run with
# an empty outbox is a single indexed no-op query.
#
# Schedule: "*/5 * * * *" = every 5 minutes
[functions."canonical-outbox-scheduler"]
  schedule = "*/5 * * * *"

# ─────────── Canonical Reconciliation ───────────
#
# Drift backstop: re-syncs customers/sites that never reached canonical
# (canonical_id IS NULL) — catches pre-outbox rows / missed enqueues so the
# reference layer self-heals. Daily, off-peak. POSTs to
# /api/cron/reconcile-canonical with CRON_SECRET.
#
# Schedule: "0 23 * * *" = 23:00 UTC daily
[functions."canonical-reconcile-scheduler"]
  schedule = "0 23 * * *"

# ─────────── Canonical Pull ───────────────────
#
# Nightly pull from sks-canonical into eq-service: fetches customers, sites,
# and assets added or updated in EQ Field and upserts them locally. Closes the
# sync loop — write-through handles eq-service→canonical; this handles
# canonical→eq-service. Runs at 22:00 UTC (before the reconcile at 23:00 UTC)
# so newly-pulled records are immediately backstopped. Skips gracefully if
# CANONICAL_API_KEY_SERVICE is not set.
#
# Schedule: "0 22 * * *" = 22:00 UTC daily
[functions."canonical-pull-scheduler"]
  schedule = "0 22 * * *"
